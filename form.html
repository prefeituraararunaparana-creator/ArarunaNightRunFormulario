<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./css/style.css" />
        <script src="js/app.js" defer></script>
        <title>Inscrição - Araruna Night Run 2026</title>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Araruna Night Run</h1>
                <p>Formulário de Inscrição 2026</p>
            </div>

            <div class="form-body">
                <div id="msg" class="msg"></div>

                <form id="inscricaoForm">
                    <div class="form-group">
                        <label for="nome">Nome completo *</label>
                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            required
                            maxlength="120"
                            placeholder="Seu nome completo"
                        />
                    </div>

                    <div class="form-group">
                        <label for="dateInput">Data de nascimento *</label>
                        <input
                            pattern="\d{2}/\d{2}/\d{4}"
                            type="text"
                            id="dateInput"
                            name="dateInput"
                            required
                            placeholder="dia/mês/ano"
                        />
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone *</label>
                        <input
                            type="tel"
                            id="telefone"
                            name="telefone"
                            required
                            maxlength="16"
                            placeholder="(44) 99999-9999"
                        />
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            maxlength="120"
                            placeholder="seu@email.com"
                        />
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select id="estado" name="estado" required>
                            <option>Paraná</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <select id="cidade" name="cidade" required></select>
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" name="categoria" required>
                            <option value="">Selecione...</option>
                            <option value="1 Volta - 2.4KM">
                                1 Volta - 2.4KM
                            </option>
                            <option value="2 Voltas - 4.8KM">
                                2 Voltas - 4.8KM
                            </option>
                            <option value="3 Voltas - 7.2KM">
                                3 Voltas - 7.8KM
                            </option>
                            <option value="Caminhada">Caminhada</option>
                        </select>
                        <button type="submit" id="btnEnviar" class="enviar">
                            Realizar inscrição
                        </button>
                    </div>
                </form>
            </div>

            <div class="footer">
                Prefeitura de Araruna • Inscrição online <br />
                <a href="home.html">
                    <button class="retornar">Retornar</button>
                </a>
            </div>
        </div>
    </body>
</html>
